services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: ticket_db
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketdb}
      POSTGRES_USER: ${DB_USER:-ticketuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ticketuser} -d ${DB_NAME:-ticketdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_NAME: ${DB_NAME:-ticketdb}
      DB_USER: ${DB_USER:-ticketuser}
      DB_PASSWORD: ${DB_PASSWORD:-ticketpass}
      DB_HOST: db
      DB_PORT: 5432
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: /app/entrypoint.sh

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
