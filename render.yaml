databases:
  - name: support-nest-db
    databaseName: ticketdb
    user: ticketuser
    plan: free

services:
  # Django Backend
  - type: web
    name: support-nest-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/tickets/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: DB_HOST
        fromDatabase:
          name: support-nest-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: support-nest-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: support-nest-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: support-nest-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: support-nest-db
          property: password
      - key: GEMINI_API_KEY
        sync: false       # Set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false       # Set to your frontend URL after first deploy

  # React Frontend (static site)
  - type: web
    name: support-nest-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        sync: false       # Set to your backend Render URL after first deploy
